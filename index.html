<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ali Baba | Administration</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { background: #f0f2f5; font-family: 'Segoe UI', sans-serif; }
        .user-card, .request-card { background: white; border-radius: 12px; border-left: 5px solid #ff6a00; shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05); }
        .btn-action { transition: 0.2s; }
        .btn-action:active { transform: scale(0.9); }
        .tab-active { border-bottom: 3px solid #ff6a00; color: #ff6a00; font-weight: 900; }
    </style>
</head>
<body class="p-4 pb-20">

    <div class="flex justify-between items-center mb-6">
        <h1 class="text-2xl font-black text-slate-800 uppercase italic">Dashboard Admin</h1>
        <button onclick="location.reload()" class="text-[#ff6a00]"><i class="fa-solid fa-rotate"></i></button>
    </div>

    <div class="grid grid-cols-2 gap-4 mb-6">
        <div class="bg-white p-4 rounded-xl shadow-sm border border-slate-200">
            <p class="text-[10px] uppercase font-bold text-slate-400">Total Utilisateurs</p>
            <p id="totalUsers" class="text-xl font-black text-slate-800">...</p>
        </div>
        <div class="bg-[#ff6a00] p-4 rounded-xl shadow-sm text-white">
            <p class="text-[10px] uppercase font-bold opacity-80">Volume Investi</p>
            <p id="totalInvested" class="text-xl font-black text-white">...</p>
        </div>
    </div>

    <div class="flex justify-around mb-6 border-b border-slate-200">
        <button onclick="showSection('clients')" id="tab-clients" class="pb-2 text-xs uppercase font-bold tab-active">Clients</button>
        <button onclick="showSection('recharges')" id="tab-recharges" class="pb-2 text-xs uppercase font-bold">Recharges</button>
        <button onclick="showSection('retraits')" id="tab-retraits" class="pb-2 text-xs uppercase font-bold">Retraits</button>
    </div>

    <div id="section-clients">
        <div class="mb-6">
            <input type="tel" id="searchPhone" placeholder="Rechercher par numéro..." 
                   class="w-full p-3 rounded-xl border-none shadow-sm focus:ring-2 focus:ring-[#ff6a00] outline-none">
        </div>
        <div id="usersList" class="space-y-4"></div>
    </div>

    <div id="section-recharges" class="hidden space-y-4">
        <h2 class="text-xs font-bold text-slate-400 uppercase mb-2">Demandes de recharge</h2>
        <div id="rechargesList" class="space-y-4"></div>
    </div>

    <div id="section-retraits" class="hidden space-y-4">
        <h2 class="text-xs font-bold text-slate-400 uppercase mb-2">Demandes de retrait</h2>
        <div id="retraitsList" class="space-y-4"></div>
    </div>

    <script>
        const BASE_URL = "https://alibaba-f22a0-default-rtdb.firebaseio.com";

        // NAVIGATION
        function showSection(section) {
            document.getElementById('section-clients').classList.add('hidden');
            document.getElementById('section-recharges').classList.add('hidden');
            document.getElementById('section-retraits').classList.add('hidden');
            document.getElementById('tab-clients').classList.remove('tab-active');
            document.getElementById('tab-recharges').classList.remove('tab-active');
            document.getElementById('tab-retraits').classList.remove('tab-active');

            document.getElementById('section-' + section).classList.remove('hidden');
            document.getElementById('tab-' + section).classList.add('tab-active');

            if(section === 'recharges') fetchRequests('recharges');
            if(section === 'retraits') fetchRequests('retraits');
            if(section === 'clients') fetchAllUsers();
        }

        // --- GESTION DES UTILISATEURS ---
        async function fetchAllUsers() {
            const res = await fetch(`${BASE_URL}/users.json`);
            const data = await res.json();
            if (!data) return;
            const usersArray = Object.values(data);
            renderUsers(usersArray);
            calculateStats(usersArray);
        }

        function calculateStats(users) {
            document.getElementById('totalUsers').innerText = users.length;
            const total = users.reduce((acc, user) => acc + (user.totalInvested || 0), 0);
            document.getElementById('totalInvested').innerText = `FC ${total.toLocaleString()}`;
        }

        function renderUsers(users) {
            const list = document.getElementById('usersList');
            list.innerHTML = users.reverse().map(user => `
                <div class="user-card p-4 shadow-sm space-y-3">
                    <div class="flex justify-between items-start">
                        <div>
                            <p class="font-black text-slate-800">${user.username || 'Utilisateur'}</p>
                            <p class="text-xs text-slate-500 font-bold tracking-wider">+${user.phone}</p>
                        </div>
                        <div class="text-right">
                            <p class="text-xs font-black text-[#ff6a00]">Solde: FC ${user.balance.toLocaleString()}</p>
                            <p class="text-[9px] font-bold text-slate-400 uppercase">VIP: ${user.vipActive || 'Aucun'}</p>
                        </div>
                    </div>
                    <div class="flex gap-2 pt-2 border-t border-slate-50">
                        <button onclick="editBalance('${user.phone}', ${user.balance})" class="btn-action flex-1 bg-slate-800 text-white py-2 rounded-lg text-[10px] font-bold uppercase">Modifier Solde</button>
                        <button onclick="deleteUser('${user.phone}')" class="btn-action bg-red-50 text-red-600 px-4 py-2 rounded-lg text-[10px]"><i class="fa-solid fa-trash"></i></button>
                    </div>
                </div>
            `).join('');
        }

        // --- GESTION DES DEMANDES (RECHARGES / RETRAITS) ---
        async function fetchRequests(type) {
            const list = document.getElementById(type + 'List');
            list.innerHTML = "<p class='text-center text-slate-400 py-10 italic'>Chargement...</p>";
            
            const res = await fetch(`${BASE_URL}/${type}.json`);
            const data = await res.json();
            
            if (!data) {
                list.innerHTML = "<p class='text-center text-slate-400 py-10'>Aucune demande en attente.</p>";
                return;
            }

            list.innerHTML = Object.keys(data).map(id => {
                const req = data[id];
                return `
                    <div class="request-card p-4 shadow-sm space-y-3 border-l-5 ${type === 'recharges' ? 'border-green-500' : 'border-red-500'}">
                        <div class="flex justify-between items-center">
                            <div>
                                <p class="font-black text-slate-800">+${req.phone}</p>
                                <p class="text-[10px] text-slate-400 font-bold">${req.date || 'Date inconnue'}</p>
                            </div>
                            <div class="text-right">
                                <p class="text-sm font-black text-slate-800 italic">FC ${req.montant.toLocaleString()}</p>
                                <p class="text-[9px] font-bold uppercase text-slate-400">${type}</p>
                            </div>
                        </div>
                        <div class="flex gap-2 pt-2 border-t border-slate-50">
                            <button onclick="approveRequest('${type}', '${id}', '${req.phone}', ${req.montant})" class="btn-action flex-1 bg-green-600 text-white py-2 rounded-lg text-[10px] font-bold uppercase">Approuver</button>
                            <button onclick="rejectRequest('${type}', '${id}')" class="btn-action flex-1 bg-red-600 text-white py-2 rounded-lg text-[10px] font-bold uppercase">Rejeter</button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        async function approveRequest(type, id, phone, montant) {
            if(!confirm(`Valider cette transaction de FC ${montant.toLocaleString()} ?`)) return;

            try {
                // Récupérer solde actuel
                const userRes = await fetch(`${BASE_URL}/users/${phone}.json`);
                const user = await userRes.json();
                
                let nouveauSolde = user.balance || 0;
                if(type === 'recharges') nouveauSolde += montant;
                if(type === 'retraits') {
                    // Si retrait, l'argent est déjà déduit ou doit l'être
                    // Si vous déduisez à la demande, ici on ne fait rien au solde
                }

                // Update solde et supprimer demande
                await fetch(`${BASE_URL}/users/${phone}.json`, {
                    method: 'PATCH',
                    body: JSON.stringify({ balance: nouveauSolde })
                });
                await fetch(`${BASE_URL}/${type}/${id}.json`, { method: 'DELETE' });

                alert("Transaction approuvée !");
                fetchRequests(type);
            } catch (e) { alert("Erreur serveur."); }
        }

        async function rejectRequest(type, id) {
            if(!confirm("Rejeter cette demande ?")) return;
            await fetch(`${BASE_URL}/${type}/${id}.json`, { method: 'DELETE' });
            fetchRequests(type);
        }

        // --- FONCTIONS EXISTANTES ---
        async function editBalance(phone, currentBalance) {
            const amount = prompt(`Nouveau solde pour +${phone} :`, currentBalance);
            if (!amount) return;
            await fetch(`${BASE_URL}/users/${phone}.json`, {
                method: 'PATCH',
                body: JSON.stringify({ balance: parseFloat(amount) })
            });
            fetchAllUsers();
        }

        async function deleteUser(phone) {
            if (!confirm(`Supprimer +${phone} ?`)) return;
            await fetch(`${BASE_URL}/users/${phone}.json`, { method: 'DELETE' });
            fetchAllUsers();
        }

        document.getElementById('searchPhone').addEventListener('input', async (e) => {
            const val = e.target.value;
            const res = await fetch(`${BASE_URL}/users.json`);
            const data = await res.json();
            if(!data) return;
            const filtered = Object.values(data).filter(u => u.phone.includes(val));
            renderUsers(filtered);
        });

        window.onload = fetchAllUsers;
    </script>
</body>
</html>
