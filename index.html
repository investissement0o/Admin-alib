<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ali Baba | Administration</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { background: #f0f2f5; font-family: 'Segoe UI', sans-serif; }
        .request-card { background: white; border-radius: 12px; border-left: 5px solid #ff6a00; transition: 0.3s; }
        .tab-active { border-bottom: 3px solid #ff6a00; color: #ff6a00; font-weight: 900; }
    </style>
</head>
<body class="p-4 pb-20">

    <div class="flex justify-between items-center mb-6">
        <h1 class="text-2xl font-black text-slate-800 uppercase italic">Dashboard Admin</h1>
        <button onclick="location.reload()" class="text-[#ff6a00] active:rotate-180 transition-transform">
            <i class="fa-solid fa-rotate"></i>
        </button>
    </div>

    <div class="flex justify-around mb-6 border-b border-slate-200 bg-white rounded-t-xl">
        <button onclick="showSection('recharges')" id="tab-recharges" class="flex-1 py-4 text-[10px] uppercase font-bold tab-active">Recharges</button>
        <button onclick="showSection('retraits')" id="tab-retraits" class="flex-1 py-4 text-[10px] uppercase font-bold">Retraits</button>
    </div>

    <div id="list-container" class="space-y-4">
        <p class="text-center text-slate-400 py-10 italic">Chargement des demandes...</p>
    </div>

    <script>
        const BASE_URL = "https://alibaba-f22a0-default-rtdb.firebaseio.com";
        let currentTab = 'recharges';

        // Changer d'onglet
        function showSection(type) {
            currentTab = type;
            document.getElementById('tab-recharges').classList.remove('tab-active');
            document.getElementById('tab-retraits').classList.remove('tab-active');
            document.getElementById('tab-' + type).classList.add('tab-active');
            fetchRequests();
        }

        // Charger les demandes depuis Firebase
        async function fetchRequests() {
            const listDiv = document.getElementById('list-container');
            
            try {
                const res = await fetch(`${BASE_URL}/${currentTab}.json`);
                const data = await res.json();
                
                if (!data) {
                    listDiv.innerHTML = `<div class="text-center py-20 opacity-40"><i class="fa-solid fa-box-open text-4xl mb-2"></i><p>Aucune demande de ${currentTab}</p></div>`;
                    return;
                }

                listDiv.innerHTML = Object.keys(data).map(id => {
                    const req = data[id];
                    return `
                        <div id="card-${id}" class="request-card p-4 shadow-sm border-l-4 ${currentTab === 'recharges' ? 'border-green-500' : 'border-red-500'}">
                            <div class="flex justify-between items-start">
                                <div>
                                    <p class="font-black text-slate-800 text-sm">Client: +${req.phone}</p>
                                    <p class="text-[10px] text-slate-500 font-bold">Expéditeur: ${req.expediteur || req.receveur || 'N/A'}</p>
                                    <p class="text-[9px] text-slate-400 italic">${req.date}</p>
                                </div>
                                <div class="text-right">
                                    <p class="text-lg font-black text-slate-900">FC ${req.montant.toLocaleString()}</p>
                                    <p class="text-[9px] font-bold text-[#ff6a00] uppercase">${req.reseau || 'Transfert'}</p>
                                </div>
                            </div>
                            
                            <div class="flex gap-2 mt-4 pt-3 border-t border-slate-50">
                                <button onclick="processRequest('valider', '${id}', '${req.phone}', ${req.montant})" 
                                        class="flex-1 bg-green-600 text-white py-3 rounded-xl text-[10px] font-black uppercase tracking-widest active:scale-95 transition-all">
                                    Valider
                                </button>
                                <button onclick="processRequest('rejeter', '${id}', '${req.phone}', ${req.montant})" 
                                        class="flex-1 bg-red-50 text-red-600 py-3 rounded-xl text-[10px] font-black uppercase tracking-widest active:scale-95 transition-all">
                                    Rejeter
                                </button>
                            </div>
                        </div>
                    `;
                }).join('');
            } catch (e) {
                listDiv.innerHTML = "<p class='text-center text-red-500 font-bold'>Erreur de connexion Firebase</p>";
            }
        }

        // LOGIQUE DE VALIDATION / REJET
        async function processRequest(action, id, phone, montant) {
            const confirmMsg = action === 'valider' ? `Approuver FC ${montant} pour +${phone} ?` : `Rejeter cette demande ?`;
            if (!confirm(confirmMsg)) return;

            try {
                if (action === 'valider' && currentTab === 'recharges') {
                    // 1. Récupérer solde actuel de l'utilisateur
                    const userRes = await fetch(`${BASE_URL}/users/${phone}.json`);
                    const user = await userRes.json();

                    if (user) {
                        const nouveauSolde = (parseFloat(user.balance) || 0) + parseFloat(montant);
                        // 2. Mettre à jour le solde dans Firebase
                        await fetch(`${BASE_URL}/users/${phone}.json`, {
                            method: 'PATCH',
                            body: JSON.stringify({ balance: nouveauSolde })
                        });
                    }
                }
                
                // 3. SUPPRIMER LA DEMANDE (Qu'elle soit validée ou rejetée)
                await fetch(`${BASE_URL}/${currentTab}/${id}.json`, { method: 'DELETE' });

                // 4. DISPARITION IMMÉDIATE DE L'INTERFACE
                const card = document.getElementById(`card-${id}`);
                if (card) {
                    card.style.opacity = '0';
                    card.style.transform = 'translateX(100px)';
                    setTimeout(() => { fetchRequests(); }, 300); // Rafraîchit la liste proprement
                }

            } catch (e) {
                alert("Erreur lors de l'opération.");
            }
        }

        // Charger les recharges par défaut au lancement
        window.onload = fetchRequests;
    </script>
</body>
</html>
